<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0784b5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>Reacto STP Dashboard | Awatech Solutions</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'monospace']
                    },
                    colors: {
                        cmd: {
                            bg: '#080e1c',
                            surface: '#0f1729',
                            card: '#141e35',
                            border: '#1e2d4a',
                            muted: '#8898b8',
                            text: '#e8edf8',
                        },
                        reacto: { blue: '#1c4c82', lightBlue: '#f0f5fa', green: '#2e7d32', lightGreen: '#e8f5e9', accent: '#0288d1' },
                        gray: { 50: '#f8f9fa', 100: '#f1f3f5', 800: '#343a40', 900: '#212529' }
                    },
                    boxShadow: {
                        'card': '0 4px 12px rgba(0, 0, 0, 0.05)',
                        'hover': '0 8px 24px rgba(28, 76, 130, 0.12)',
                        'cmd-card': '0 4px 24px rgba(0,0,0,0.4)',
                        'cmd-glow': '0 0 30px rgba(99,102,241,0.15)'
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.3s ease-out forwards',
                        'modal-enter': 'modalEnter 0.3s ease-out forwards',
                        'status-glow': 'statusGlow 2s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: 0, transform: 'translateY(12px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        modalEnter: { '0%': { opacity: 0, scale: 0.95 }, '100%': { opacity: 1, scale: 1 } },
                        statusGlow: { '0%, 100%': { boxShadow: '0 0 4px currentColor' }, '50%': { boxShadow: '0 0 12px currentColor' } }
                    }
                }
            }
        }
    </script>
    <style>
        /* === GLOBAL FONT & BASE === */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #080e1c;
            color: #e8edf8;
            font-family: 'Outfit', 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html,
        body {
            max-width: 100%;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        img,
        video,
        canvas {
            max-width: 100%;
        }

        button,
        a {
            touch-action: manipulation;
        }

        :root {
            --aqua-white: #ffffff;
            --aqua-mist: #cadeef;
            --aqua-sky: #9bd4e4;
            --aqua-cyan: #39ace7;
            --aqua-deep: #0784b5;
            --client-blue-900: #011f4b;
            --client-blue-800: #03396c;
            --client-blue-700: #005b96;
            --client-blue-400: #6497b1;
            --client-blue-200: #b3cde0;
            --aqua-glass-strong: rgba(255, 255, 255, 0.78);
            --aqua-glass-soft: rgba(255, 255, 255, 0.62);
            --admin-glass-surface: rgba(255, 255, 255, 0.56);
            --admin-glass-subsurface: rgba(223, 235, 246, 0.34);
            --admin-glass-chip: rgba(255, 255, 255, 0.74);
            --admin-glass-border: rgba(155, 212, 228, 0.44);
            --admin-glass-border-strong: rgba(57, 172, 231, 0.42);
            --admin-glass-hover: rgba(223, 235, 246, 0.24);
        }

        .reacto-logo-shell {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            isolation: isolate;
        }

        .reacto-logo-pill {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(155, 212, 228, 0.9);
            border-radius: 999px;
            box-shadow: 0 12px 24px rgba(7, 132, 181, 0.14);
            backdrop-filter: blur(10px) saturate(130%);
        }

        .reacto-logo-mark {
            position: relative;
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            filter: drop-shadow(0 8px 18px rgba(7, 132, 181, 0.2));
        }

        .reacto-logo-mark::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 999px;
            background: conic-gradient(from 120deg, rgba(57, 172, 231, 0.05), rgba(7, 132, 181, 0.28), rgba(46, 125, 50, 0.18), rgba(57, 172, 231, 0.06));
            filter: blur(1px);
            animation: reactoHaloSpin 6.5s linear infinite;
            opacity: 0.55;
            z-index: -1;
        }

        .reacto-logo-word {
            font-weight: 900;
            letter-spacing: 0.02em;
            line-height: 1;
            color: #0f4f7f;
            text-shadow: 0 2px 10px rgba(7, 132, 181, 0.12);
            background: linear-gradient(100deg, #0f4f7f 10%, #0784b5 48%, #0f4f7f 85%);
            background-size: 220% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: reactoWordShine 4.2s ease-in-out infinite;
        }

        .reacto-mark-drop {
            transform-origin: 52% 52%;
            animation: reactoDropFloat 4.2s ease-in-out infinite;
        }

        .reacto-mark-wave {
            transform-origin: 50% 50%;
            animation: reactoWaveSwing 4.2s ease-in-out infinite;
        }

        .reacto-mark-accent {
            animation: reactoAccentPulse 3.4s ease-in-out infinite;
        }

        .reacto-mark-orbit {
            transform-origin: 32px 32px;
            animation: reactoOrbitSpin 5.8s linear infinite;
        }

        @media (hover: hover) and (pointer: fine) {
            .reacto-logo-shell:hover .reacto-mark-drop {
                animation: reactoDropHoverBurst 0.72s cubic-bezier(0.22, 1, 0.36, 1) infinite;
            }

            .reacto-logo-shell:hover .reacto-logo-mark::before {
                animation-duration: 2.2s;
                opacity: 0.95;
            }
        }

        @media (hover: none), (pointer: coarse) {
            .reacto-logo-shell:active .reacto-mark-drop {
                animation: reactoDropHoverBurst 0.58s cubic-bezier(0.22, 1, 0.36, 1) 1;
            }

            .reacto-logo-shell:active .reacto-logo-mark::before {
                animation-duration: 2.8s;
                opacity: 0.92;
            }
        }

        @keyframes reactoDropFloat {
            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-1.8px) scale(1.015);
            }
        }

        @keyframes reactoDropHoverBurst {
            0% {
                transform: translateY(0px) rotate(0deg) scale(1);
            }

            35% {
                transform: translateY(-3.2px) rotate(-3deg) scale(1.05);
            }

            68% {
                transform: translateY(-1px) rotate(2.2deg) scale(1.02);
            }

            100% {
                transform: translateY(0px) rotate(0deg) scale(1);
            }
        }

        @keyframes reactoWaveSwing {
            0%,
            100% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(-2.4deg);
            }
        }

        @keyframes reactoAccentPulse {
            0%,
            100% {
                opacity: 0.85;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.12);
            }
        }

        @keyframes reactoOrbitSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes reactoHaloSpin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(-360deg);
            }
        }

        @keyframes reactoWordShine {
            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .reacto-mark-drop,
            .reacto-mark-wave,
            .reacto-mark-accent,
            .reacto-mark-orbit,
            .reacto-logo-mark::before,
            .reacto-logo-word {
                animation: none !important;
            }
        }

        @media (max-width: 640px) {
            .reacto-logo-shell {
                gap: 6px;
            }

            .reacto-logo-mark {
                filter: drop-shadow(0 4px 10px rgba(7, 132, 181, 0.16));
            }

            .hero-footer-card {
                padding: 12px 14px;
                border-radius: 12px;
            }

            .hero-footer-heading {
                gap: 8px;
                margin-bottom: 4px;
            }

            .hero-footer-title {
                font-size: 12px;
                line-height: 1.1;
            }

            .hero-footer-desc {
                font-size: 10px;
                line-height: 1.25;
            }

            .hero-footer-chip {
                font-size: 7px;
                padding: 4px 6px;
            }
        }

        /* ============================================================
           ADMIN COMMAND CENTER &#8212; PREMIUM LIGHT THEME
        ============================================================ */
        .admin-bg {
            min-height: 100vh;
            background-image: linear-gradient(135deg, #fcfdf9 0%, #f4f8f1 45%, #edf5ea 100%);
            background-color: #f8fbf5;
            background-attachment: scroll;
        }

        .admin-sidebar {
            background: linear-gradient(180deg, rgba(8, 97, 140, 0.94) 0%, rgba(10, 120, 167, 0.88) 100%);
            border-right: 1px solid rgba(202, 222, 239, 0.38);
            box-shadow: 4px 0 24px rgba(7, 132, 181, 0.14);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(7px) saturate(116%);
        }

        .admin-sidebar-brand {
            padding: 26px 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .admin-nav-item {
            display: flex;
            align-items: center;
            gap: 13px;
            padding: 13px 17px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 16px;
            font-weight: 700;
            color: var(--aqua-mist);
            border: 1px solid transparent;
            width: 100%;
            text-align: left;
            margin-bottom: 8px;
            min-height: 46px;
            line-height: 1.3;
        }

        .admin-nav-item:hover {
            background: rgba(155, 212, 228, 0.2);
            color: var(--aqua-white);
            transform: translateX(4px);
        }

        .admin-nav-item.active {
            background: linear-gradient(135deg, var(--aqua-cyan), var(--aqua-deep));
            color: var(--aqua-white);
            font-weight: 700;
            border-left: 4px solid var(--aqua-mist);
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(7, 132, 181, 0.32);
        }

        .admin-nav-item.active svg {
            color: #ffffff;
        }

        .sidebar-section-label {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 16px;
            margin-left: 8px;
            color: rgba(57, 172, 231, 0.7);
            line-height: 1.25;
        }

        .sidebar-section-label.divider {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* KPI Cards with Details & Sparklines - Updated with new palette and transparency */
        .kpi-card {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(10px) saturate(114%);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(155, 212, 228, 0.62);
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(9, 89, 128, 0.12);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 18px 18px 0 0;
        }

        .kpi-card:hover {
            box-shadow: 0 12px 30px rgba(7, 132, 181, 0.16);
        }

        .kpi-card.cyan::before {
            background: linear-gradient(90deg, #9bd4e4, #39ace7);
        }

        .kpi-card.emerald::before {
            background: linear-gradient(90deg, #39ace7, #0784b5);
        }

        .kpi-card.orange::before {
            background: linear-gradient(90deg, #cadeef, #39ace7);
        }

        .kpi-card.indigo::before {
            background: linear-gradient(90deg, #39ace7, #0784b5);
        }

        .kpi-trend-wrap {
            position: relative;
            border-radius: 12px;
            padding: 8px 8px 6px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.36));
            border: 1px solid rgba(155, 212, 228, 0.34);
        }

        .kpi-trend-wrap::after {
            content: '';
            position: absolute;
            left: 10px;
            right: 10px;
            top: 10px;
            bottom: 8px;
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(57, 172, 231, 0.08), rgba(57, 172, 231, 0));
            pointer-events: none;
        }

        .kpi-gridline-y {
            border-top: 1px dashed rgba(14, 47, 79, 0.26);
        }

        .kpi-gridline-x {
            border-left: 1px dashed rgba(14, 47, 79, 0.15);
        }

        .kpi-axis-chip {
            font-size: 10px;
            font-weight: 700;
            color: #144b74;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(155, 212, 228, 0.5);
            border-radius: 999px;
            padding: 1px 7px;
            letter-spacing: 0.01em;
        }

        .kpi-live-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #0ea5e9;
            box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.55);
            animation: kpiLivePulse 2.1s ease-out infinite;
        }

        @keyframes kpiLivePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.55);
            }

            70% {
                box-shadow: 0 0 0 9px rgba(14, 165, 233, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(14, 165, 233, 0);
            }
        }

        .panel-card {
            background: rgba(255, 255, 255, 0.74);
            backdrop-filter: blur(10px) saturate(114%);
            border: 1px solid rgba(155, 212, 228, 0.52);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        /* Admin table */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            padding: 12px 20px;
            text-align: left;
            font-size: 11.5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--aqua-deep);
            background: rgba(255, 255, 255, 0.48);
            border-bottom: 1px solid rgba(155, 212, 228, 0.45);
        }

        .admin-table td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(155, 212, 228, 0.26);
            vertical-align: middle;
            font-size: 13px;
            color: #1f5b82;
        }

        .admin-table tbody tr {
            transition: background 0.15s;
            cursor: pointer;
        }

        .admin-table tbody tr:hover {
            background: rgba(202, 222, 239, 0.2);
        }

        /* Admin header */
        .admin-header {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(155, 212, 228, 0.55);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px) saturate(110%);
        }

        .admin-search {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.55), rgba(202, 222, 239, 0.42));
            border: 1px solid rgba(57, 172, 231, 0.35);
            border-radius: 999px;
            padding: 9px 16px 9px 38px;
            font-size: 13px;
            font-weight: 700;
            color: #0d4f7d;
            outline: none;
            transition: all 0.2s ease;
            width: 220px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65), 0 6px 16px rgba(7, 132, 181, 0.08);
        }

        .admin-search:focus {
            border-color: var(--aqua-deep);
            box-shadow: 0 0 0 3px rgba(7, 132, 181, 0.18), 0 8px 22px rgba(7, 132, 181, 0.18);
            width: 250px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.68), rgba(202, 222, 239, 0.5));
        }

        .admin-search::placeholder {
            color: rgba(13, 79, 125, 0.58);
            font-weight: 700;
        }

        .admin-new-site-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.01em;
            color: #ffffff;
            background: linear-gradient(135deg, #0784b5, #39ace7);
            border: 1px solid rgba(255, 255, 255, 0.45);
            box-shadow: 0 8px 22px rgba(7, 132, 181, 0.3);
            transition: all 0.2s ease;
        }

        .admin-new-site-btn:hover {
            transform: translateY(-1px);
            background: linear-gradient(135deg, #0674a0, #279bda);
            box-shadow: 0 12px 26px rgba(7, 132, 181, 0.36);
        }

        .admin-new-site-btn:active {
            transform: translateY(0);
        }

        .mobile-menu-button {
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(130, 167, 190, 0.5);
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 12px rgba(7, 132, 181, 0.16);
            flex-shrink: 0;
        }

        .mobile-menu-button .menu-lines {
            width: 16px;
            height: 12px;
            display: inline-flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .mobile-menu-button .menu-lines span {
            display: block;
            width: 100%;
            height: 2px;
            border-radius: 999px;
            background: #0f4f7f;
        }

        .monitor-summary-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.55), rgba(202, 222, 239, 0.4));
            border: 1px solid rgba(57, 172, 231, 0.25);
            border-radius: 16px;
            padding: 12px 14px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
        }

        .monitor-summary-card.is-neutral {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(218, 238, 252, 0.45));
        }

        .monitor-summary-card.is-good {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(218, 238, 252, 0.45));
            border-color: rgba(57, 172, 231, 0.25);
        }

        .monitor-summary-card.is-warning {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(218, 238, 252, 0.45));
            border-color: rgba(57, 172, 231, 0.25);
        }

        .monitor-summary-card.is-risk {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(218, 238, 252, 0.45));
            border-color: rgba(57, 172, 231, 0.25);
        }

        .monitor-cluster-card {
            position: relative;
            background: linear-gradient(165deg, rgba(255, 255, 255, 0.92), rgba(236, 246, 252, 0.82));
            border: 1px solid rgba(188, 214, 230, 0.9);
            border-radius: 22px;
            backdrop-filter: blur(7px) saturate(115%);
            box-shadow: 0 14px 30px rgba(8, 66, 111, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            animation: monitorCardIn 0.42s ease both;
            height: 100%;
        }

        .monitor-cluster-grid {
            grid-auto-rows: 1fr;
        }

        .monitor-cluster-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, rgba(57, 172, 231, 0.18), rgba(57, 172, 231, 0.6), rgba(57, 172, 231, 0.15));
            opacity: 0.85;
        }

        .monitor-cluster-card.monitor-status-optimal::before {
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.18), rgba(16, 185, 129, 0.72), rgba(16, 185, 129, 0.2));
        }

        .monitor-cluster-card.monitor-status-warning::before {
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.75), rgba(245, 158, 11, 0.22));
        }

        .monitor-cluster-card.monitor-status-critical::before {
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.22), rgba(239, 68, 68, 0.78), rgba(239, 68, 68, 0.24));
        }

        @keyframes monitorCardIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .monitor-cluster-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(8, 66, 111, 0.12);
            border-color: rgba(120, 179, 207, 0.62);
        }

        .monitor-kpi-tile {
            border-radius: 12px;
            border: 1px solid rgba(204, 223, 236, 0.9);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(241, 248, 253, 0.84));
            padding: 10px 8px;
            text-align: center;
        }

        .monitor-chart-wrap {
            position: relative;
            border-radius: 16px;
            border: 1px solid rgba(204, 223, 236, 0.95);
            background: linear-gradient(180deg, #fbfdff, #f2f8fc);
            padding: 10px 12px 8px 14px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
        }

        .monitor-axis-label {
            position: absolute;
            left: 8px;

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const INITIAL_PLANTS = [
            { id: '1', name: 'Pune IT Park', clientName: 'EduTech Corp', model: 'REACTO SBR', cap: 250, status: 'optimal', eff: 96, baseBod: 22, baseCod: 125, basePh: 7.2 },
            { id: '2', name: 'Mumbai Residency', clientName: 'Lodha Group', model: 'REACTO EcoSept', cap: 20, status: 'warning', eff: 88, baseBod: 29, baseCod: 190, basePh: 6.8 },
            { id: '3', name: 'Guangzhou Industrial', clientName: 'SinoTech Heavy Ind.', model: 'REACTO MBBR', cap: 5000, status: 'optimal', eff: 98, baseBod: 18, baseCod: 95, basePh: 7.4 },
            { id: '4', name: 'Rural BioUnit', clientName: 'Gov. Jal Jeevan', model: 'REACTO Biomimicry', cap: 12, status: 'critical', eff: 45, baseBod: 47, baseCod: 310, basePh: 5.9 },
        ];
        const LIVE_UPDATE_INTERVAL_MS = 5000;

        const createSeed = (seed) => {
            const text = String(seed);
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash % 10000) + 1;
        };

        const seededRange = (seed, index, min, max) => {
            const base = createSeed(seed);
            const raw = Math.sin((base + index * 17) * 12.9898) * 43758.5453;
            const normalized = raw - Math.floor(raw);
            return +(min + normalized * (max - min)).toFixed(1);
        };

        const createTrendData = (seed, labels, min, max) => labels.map((label, index) => ({
            time: label,
            val: seededRange(seed, index, min, max),
        }));

        const buildTrendPath = (trendData) => {
            const getX = (idx) => (idx / (trendData.length - 1)) * 100;
            const getY = (val) => 40 - (val / 100) * 35;
            return trendData.reduce((acc, d, idx) => {
                if (idx === 0) return `M ${getX(idx)} ${getY(d.val)}`;
                return `${acc} L ${getX(idx)} ${getY(d.val)}`;
            }, "");
        };

        const buildTinySparkPath = (seed) => {
            const points = [
                seededRange(seed, 0, 8, 24),
                seededRange(seed, 1, 6, 20),
                seededRange(seed, 2, 9, 21),
                seededRange(seed, 3, 11, 24),
                seededRange(seed, 4, 7, 22),
                seededRange(seed, 5, 8, 24),
            ];
            return points.reduce((acc, point, idx) => {
                const x = idx * 20;
                if (idx === 0) return `M${x} ${point}`;
                return `${acc} L ${x} ${point}`;
            }, '');
        };

        const buildTinySparkArea = (seed) => `${buildTinySparkPath(seed)} L 100 26 L 0 26 Z`;

        const buildBarHeights = (seed, count = 6) => Array.from({ length: count }, (_, idx) =>
            Math.round(seededRange(seed, idx, 42, 98))
        );

        const ICON_NAME_ALIASES = {
            Siren: 'BellRing',
            Clock3: 'Clock',
            LayoutDashboard: 'LayoutGrid',
            FileSpreadsheet: 'FileText',
            Pipette: 'TestTube',
            FlaskConical: 'FlaskRound',
            Braces: 'Code'
        };

        const normalizeIconKey = (iconName) => String(iconName || '').toLowerCase().replace(/[^a-z0-9]/g, '');

        const toKebabCase = (iconName) => String(iconName || '')
            .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
            .replace(/[_\s]+/g, '-')
            .toLowerCase();

        const findLucideIconDef = (iconName) => {
            const icons = window.lucide?.icons;
            if (!icons || !iconName) return null;

            const aliasesToTry = [iconName, ICON_NAME_ALIASES[iconName]].filter(Boolean);

            for (const alias of aliasesToTry) {
                const direct = icons[alias] || icons[toKebabCase(alias)];
                if (direct) return direct;

                const normalizedAlias = normalizeIconKey(alias);
                const matchedKey = Object.keys(icons).find((k) => normalizeIconKey(k) === normalizedAlias);
                if (matchedKey) return icons[matchedKey];
            }

            return null;
        };

        function Icon({ name, className = "", size = 20, strokeWidth = 2.5, style = {}, fill = 'none' }) {
            const elRef = useRef(null);
            useEffect(() => {
                if (elRef.current && window.lucide) {
                    try {
                        const icon = findLucideIconDef(name);
                        if (icon) {
                            elRef.current.innerHTML = icon.toSvg({
                                width: size,
                                height: size,
                                stroke: 'currentColor',
                                'stroke-width': strokeWidth,
                                fill,
                            });
                        } else {
                            // Keeps empty square holders visually meaningful even if a remote icon key changes.
                            elRef.current.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16"/><path d="M12 4v16"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>`;
                        }
                    } catch (e) { }
                }
            }, [name, size, strokeWidth, fill]);
            return <i ref={elRef} data-lucide={name} className={className} style={{
                width: size,
                height: size,
                display: 'inline-flex',
                alignItems: 'center',
                justifyContent: 'center',
                verticalAlign: 'middle',
                fontStyle: 'normal',
                ...style
            }}></i>;
        }

        const ReactoLogo = ({ scale = 1, withPill = true, onClick, iconOnly = false }) => {
            const textSize = `${Math.round(34 * scale)}px`;
            const paddingY = `${6 * scale}px`;
            const paddingX = `${12 * scale}px`;
            return (
                <div
                    onClick={onClick}
                    className={`reacto-logo-shell ${onClick ? 'cursor-pointer' : ''} ${withPill ? 'reacto-logo-pill' : ''}`}
                    style={{ padding: withPill ? `${paddingY} ${paddingX}` : 0 }}
                >
                    <div className="reacto-logo-mark" style={{ width: `${56 * scale}px`, height: `${56 * scale}px` }}>
                        <svg viewBox="0 0 64 64" width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <circle cx="32" cy="32" r="28" fill="#eaf7ff" stroke="#7fc4de" strokeWidth="1.8" />

                            <g className="reacto-mark-drop">
                                <path d="M34.4 6.8C28.2 14.1 22 22 22 30.7C22 39.9 29.4 47.3 38.6 47.3C47.8 47.3 55.2 39.9 55.2 30.7C55.2 22.6 49 15 42.5 8.1C40.3 5.8 36.7 5.8 34.4 6.8Z" fill="#0b79ac" />
                                <path d="M33.5 18.5C31.1 21.8 29.8 24.6 29.8 27.4C29.8 32 33.6 35.8 38.2 35.8" stroke="#bfeaff" strokeWidth="2.5" strokeLinecap="round" />
                            </g>

                            <g className="reacto-mark-wave">
                                <path d="M8 45.4C17.7 38.6 27.8 37.4 39.3 40.3C46.4 42.1 52.6 42.1 58 39.8V45.8C51.7 49 44.8 49.7 36.9 47.8C25.7 45.1 17.4 45.6 8 53V45.4Z" fill="#158f6b" />
                                <path d="M8.2 45.7C17.6 40.1 27.7 39.4 37.4 41.8C45.7 43.9 52.1 43.7 57.8 40.9" stroke="#d9fff0" strokeWidth="1.9" strokeLinecap="round" opacity="0.78" />
                            </g>

                            <g className="reacto-mark-orbit">
                                <circle cx="32" cy="9.8" r="1.7" fill="#39ace7" opacity="0.7" />
                            </g>

                            <circle className="reacto-mark-accent" cx="11.2" cy="20.2" r="2.35" fill="#ff7c6e" />
                        </svg>
                    </div>
                    {!iconOnly && (
                        <div className="reacto-logo-word" style={{ fontSize: textSize }}>
                            REACT<span style={{ color: '#0784b5' }}>O</span>
                        </div>
                    )}
                </div>
            );
        };

        // Optimized Trend Chart Component to prevent re-renders (Memoized)
        const TrendChart = React.memo(({ data, color, labels = ['-5h', '-4h', '-3h', '-2h', '-1h', 'Now'], unit = '' }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);
            useEffect(() => {
                if (chartRef.current) chartRef.current.destroy();
                const ctx = canvasRef.current.getContext('2d');
                const lineColor = '#e67e22';
                let gradient = ctx.createLinearGradient(0, 0, 0, 80);
                gradient.addColorStop(0, lineColor + '4d');
                gradient.addColorStop(1, lineColor + '08');
                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data, borderColor: lineColor, backgroundColor: gradient, fill: true, tension: 0, borderWidth: 1, pointRadius: 0, pointHoverRadius: 4, pointBackgroundColor: '#ffffff', pointBorderColor: lineColor, pointBorderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
                        plugins: { legend: { display: false }, tooltip: { enabled: true, backgroundColor: 'rgba(255, 255, 255, 0.98)', titleColor: '#5a7b9e', titleFont: { size: 10, weight: 'bold' }, bodyColor: '#133d6b', bodyFont: { size: 12, weight: 'bold', family: 'monospace' }, borderColor: '#e2e8f0', borderWidth: 1, padding: 8, displayColors: false, callbacks: { label: (context) => context.parsed.y.toFixed(1) + (unit ? ' ' + unit : '') } } },
                        scales: { x: { display: true, grid: { color: '#e3ebf3', drawTicks: false }, ticks: { font: { size: 9, weight: '700' }, color: '#7a92a5', maxRotation: 0 } }, y: { display: true, position: 'left', grid: { color: '#e3ebf3' }, border: { display: false }, ticks: { font: { size: 9, weight: '700' }, color: '#8aa1b3', maxTicksLimit: 5, callback: (value) => Math.round(value) }, min: Math.min(...data) - (Math.max(...data) - Math.min(...data)) * 0.35 } },
                        interaction: { mode: 'index', intersect: false }
                    }
                });
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [color, unit]);
            useEffect(() => {
                if (chartRef.current) {
                    chartRef.current.data.datasets[0].data = data;
                    chartRef.current.options.scales.y.min = Math.min(...data) - (Math.max(...data) - Math.min(...data)) * 0.4;
                    chartRef.current.update('none');
                }
            }, [data]);
            return <div className="h-24 w-full mt-2 -mx-2"><canvas ref={canvasRef} style={{ width: 'calc(100% + 16px)' }}></canvas></div>;
        });
        // Optimized Tiled Official REACTO Brand Background (STRICT REQUEST)
        const BrandWatermark = React.memo(({ dark = false }) => (
            <div className="fixed inset-0 pointer-events-none z-0 select-none overflow-hidden"
                style={{
                    opacity: dark ? 0.03 : 0.05,
                    background: `radial-gradient(circle, ${dark ? '#6366f120' : '#0369a110'} 1px, transparent 1px)`,
                    backgroundSize: '40px 40px',
                }}>
            </div>
        ));

        // --- Shared Toast Component (for functionality) ---
        const Toast = ({ message, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);
            return (
                <div className="fixed top-8 left-1/2 transform -translate-x-1/2 z-[200] bg-gray-900 text-white px-6 py-3 rounded-md shadow-xl flex items-center gap-3 animate-fade-in-down font-medium text-sm border border-gray-700">
                    <Icon name="Info" size={18} className="text-[#a0c4eb]" />
                    {message}
                </div>
            );
        };

        const ModalShell = ({ onClose, overlayClassName, children }) => {
            useEffect(() => {
                const handleEscape = (event) => {
                    if (event.key === 'Escape') {
                        onClose();
                    }
                };
                window.addEventListener('keydown', handleEscape);
                return () => window.removeEventListener('keydown', handleEscape);
            }, [onClose]);

            return (
                <div
                    className={overlayClassName}
                    onMouseDown={(event) => {
                        if (event.target === event.currentTarget) {
                            onClose();
                        }
                    }}
                    role="dialog"
                    aria-modal="true"
                >
                    <button
                        onClick={onClose}
                        aria-label="Close popup"
                        className="absolute top-3 right-3 sm:top-5 sm:right-5 z-[101] w-10 h-10 rounded-full bg-white text-[#0b5f96] shadow-lg border border-[#cadeef] hover:bg-[#f0f9ff] transition flex items-center justify-center"
                    >
                        <span className="text-[24px] leading-none font-black text-[#0b5f96]">&times;</span>
                    </button>
                    {children}
                </div>
            );
        };

        const SectionLogo = ({ kind = 'overview' }) => (
            <span className="section-logo-badge" aria-hidden="true">
                {kind === 'overview' && (
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="4" width="7" height="7" rx="1.5" />
                        <rect x="14" y="4" width="7" height="7" rx="1.5" />
                        <rect x="3" y="14" width="7" height="7" rx="1.5" />
                        <rect x="14" y="14" width="7" height="7" rx="1.5" />
                    </svg>
                )}
